<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ff6600">
  <meta name="description" content="LegentShop - Your one-stop shop for electronics, fashion and more">
  <title>LegentShop - Online Shopping</title>
<style>
*,
*::before,
*::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --primary: #ff6600;
  --primary-hover: #e55c00;
  --primary-light: #fff0e6;
  --secondary: #ff8c38;
  --bg: #f5f5f5;
  --card: #ffffff;
  --text: #1a1a1a;
  --text-secondary: #666666;
  --text-light: #999999;
  --border: #e8e8e8;
  --success: #2ecc71;
  --error: #e74c3c;
  --warning: #f39c12;
  --shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
  --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.12);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 0.3s ease;
  --navbar-height: 64px;
  --font: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
  --overlay: rgba(0, 0, 0, 0.5);
}

[data-theme='dark'] {
  --bg: #121212;
  --card: #1e1e1e;
  --text: #f5f5f5;
  --text-secondary: #aaaaaa;
  --text-light: #777777;
  --border: #333333;
  --primary-light: #2a1a0a;
  --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
  --shadow-hover: 0 8px 24px rgba(0, 0, 0, 0.4);
  --overlay: rgba(0, 0, 0, 0.7);
}

html {
  scroll-behavior: smooth;
  font-size: 16px;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background var(--transition), color var(--transition);
  min-height: 100vh;
}

a {
  text-decoration: none;
  color: inherit;
}

ul {
  list-style: none;
}

img {
  max-width: 100%;
  display: block;
}

button {
  cursor: pointer;
  border: none;
  font-family: inherit;
  font-size: inherit;
}

input,
select,
textarea {
  font-family: inherit;
  font-size: inherit;
}

.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 16px;
}

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: var(--navbar-height);
  background: var(--card);
  box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
  z-index: 1000;
  transition: background var(--transition);
}

.navbar .container {
  display: flex;
  align-items: center;
  height: 100%;
  gap: 12px;
}

.hamburger {
  display: flex;
  flex-direction: column;
  gap: 4px;
  background: none;
  padding: 8px;
  cursor: pointer;
}

.hamburger span {
  display: block;
  width: 22px;
  height: 2.5px;
  background: var(--text);
  border-radius: 2px;
  transition: var(--transition);
}

.hamburger.active span:nth-child(1) {
  transform: rotate(45deg) translate(4.5px, 4.5px);
}

.hamburger.active span:nth-child(2) {
  opacity: 0;
}

.hamburger.active span:nth-child(3) {
  transform: rotate(-45deg) translate(4.5px, -4.5px);
}

.logo {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--primary);
  white-space: nowrap;
  letter-spacing: -0.5px;
}

.logo span {
  color: var(--text);
}

.search-bar {
  flex: 1;
  display: flex;
  max-width: 520px;
  position: relative;
}

.search-bar input {
  width: 100%;
  padding: 10px 44px 10px 16px;
  border: 2px solid var(--border);
  border-radius: 50px;
  background: var(--bg);
  color: var(--text);
  font-size: 0.9rem;
  transition: border var(--transition), background var(--transition);
  outline: none;
}

.search-bar input:focus {
  border-color: var(--primary);
}

.search-bar button {
  position: absolute;
  right: 4px;
  top: 50%;
  transform: translateY(-50%);
  background: var(--primary);
  color: #fff;
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  transition: background var(--transition);
}

.search-bar button:hover {
  background: var(--primary-hover);
}

.nav-actions {
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-actions button {
  background: none;
  padding: 8px;
  border-radius: 50%;
  color: var(--text);
  font-size: 1.2rem;
  position: relative;
  transition: background var(--transition);
}

.nav-actions button:hover {
  background: var(--bg);
}

.cart-btn .cart-count {
  position: absolute;
  top: 0;
  right: 0;
  background: var(--primary);
  color: #fff;
  font-size: 0.65rem;
  font-weight: 700;
  width: 18px;
  height: 18px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== SIDEBAR (mobile menu) ===== */
.sidebar-overlay {
  position: fixed;
  inset: 0;
  background: var(--overlay);
  z-index: 998;
  opacity: 0;
  pointer-events: none;
  transition: opacity var(--transition);
}

.sidebar-overlay.active {
  opacity: 1;
  pointer-events: auto;
}

.sidebar {
  position: fixed;
  top: 0;
  left: -280px;
  bottom: 0;
  width: 280px;
  background: var(--card);
  z-index: 999;
  padding: 80px 20px 20px;
  overflow-y: auto;
  transition: left var(--transition);
  box-shadow: 2px 0 12px rgba(0, 0, 0, 0.1);
}

.sidebar.open {
  left: 0;
}

.sidebar h3 {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-secondary);
  margin-bottom: 12px;
}

.sidebar .category-link {
  display: block;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 0.9rem;
  transition: background var(--transition), color var(--transition);
  cursor: pointer;
}

.sidebar .category-link:hover,
.sidebar .category-link.active {
  background: var(--primary-light);
  color: var(--primary);
}

.sidebar-divider {
  height: 1px;
  background: var(--border);
  margin: 16px 0;
}

/* ===== MAIN CONTENT ===== */
.main {
  padding-top: calc(var(--navbar-height) + 16px);
  padding-bottom: 40px;
  min-height: 100vh;
}

/* ===== CATEGORY PILLS ===== */
.category-pills {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding: 8px 0 16px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}

.category-pills::-webkit-scrollbar {
  display: none;
}

.category-pill {
  padding: 8px 20px;
  border-radius: 50px;
  background: var(--card);
  border: 1.5px solid var(--border);
  color: var(--text-secondary);
  font-size: 0.85rem;
  font-weight: 500;
  white-space: nowrap;
  cursor: pointer;
  transition: all var(--transition);
  flex-shrink: 0;
}

.category-pill:hover {
  border-color: var(--primary);
  color: var(--primary);
}

.category-pill.active {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
}

/* ===== HERO ===== */
.hero {
  background: linear-gradient(135deg, var(--primary), var(--secondary));
  border-radius: var(--radius);
  padding: 32px;
  margin-bottom: 24px;
  color: #fff;
  position: relative;
  overflow: hidden;
}

.hero::after {
  content: '';
  position: absolute;
  top: -50%;
  right: -20%;
  width: 300px;
  height: 300px;
  background: rgba(255, 255, 255, 0.08);
  border-radius: 50%;
}

.hero h1 {
  font-size: 1.6rem;
  font-weight: 800;
  margin-bottom: 8px;
  position: relative;
}

.hero p {
  font-size: 0.95rem;
  opacity: 0.9;
  margin-bottom: 16px;
  position: relative;
}

.hero .shop-now {
  display: inline-block;
  padding: 10px 28px;
  background: #fff;
  color: var(--primary);
  font-weight: 700;
  border-radius: 50px;
  font-size: 0.9rem;
  transition: transform var(--transition);
  position: relative;
}

.hero .shop-now:hover {
  transform: scale(1.05);
}

/* ===== SECTION TITLE ===== */
.section-title {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.section-title h2 {
  font-size: 1.2rem;
  font-weight: 700;
}

.section-title .view-all {
  color: var(--primary);
  font-size: 0.85rem;
  font-weight: 600;
  cursor: pointer;
}

/* ===== PRODUCT GRID ===== */
.product-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}

.product-card {
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: all var(--transition);
  cursor: pointer;
  position: relative;
  display: flex;
  flex-direction: column;
}

.product-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-hover);
}

.product-card .img-wrap {
  position: relative;
  padding-top: 100%;
  background: #fafafa;
  overflow: hidden;
}

[data-theme='dark'] .product-card .img-wrap {
  background: #2a2a2a;
}

.product-card .img-wrap img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 12px;
  transition: transform var(--transition);
}

.product-card:hover .img-wrap img {
  transform: scale(1.08);
}

.discount-badge {
  position: absolute;
  top: 8px;
  left: 8px;
  background: var(--primary);
  color: #fff;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  z-index: 2;
}

.featured-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  background: var(--warning);
  color: #fff;
  font-size: 0.65rem;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 4px;
  z-index: 2;
}

.product-card .info {
  padding: 12px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.product-card .category-tag {
  font-size: 0.7rem;
  color: var(--primary);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.product-card .name {
  font-size: 0.85rem;
  font-weight: 600;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  line-height: 1.3;
}

.product-card .price-row {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.product-card .current-price {
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--primary);
}

.product-card .original-price {
  font-size: 0.8rem;
  color: var(--text-light);
  text-decoration: line-through;
}

.product-card .add-cart-btn {
  margin-top: auto;
  padding: 8px;
  background: var(--primary);
  color: #fff;
  border-radius: var(--radius-sm);
  font-size: 0.8rem;
  font-weight: 600;
  transition: background var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}

.product-card .add-cart-btn:hover {
  background: var(--primary-hover);
}

/* ===== LOADING SPINNER ===== */
.loading-spinner {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 60px 0;
}

.spinner {
  width: 40px;
  height: 40px;
  border: 4px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

/* ===== TOAST ===== */
.toast-container {
  position: fixed;
  top: calc(var(--navbar-height) + 12px);
  right: 12px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
  pointer-events: none;
}

.toast {
  background: var(--card);
  color: var(--text);
  padding: 12px 20px;
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-hover);
  font-size: 0.85rem;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: slideInRight 0.3s ease;
  pointer-events: auto;
  border-left: 4px solid var(--primary);
}

.toast.success {
  border-left-color: var(--success);
}

.toast.error {
  border-left-color: var(--error);
}

.toast .toast-icon {
  font-size: 1.1rem;
}

@keyframes slideInRight {
  from {
    transform: translateX(100%);
    opacity: 0;
  }
  to {
    transform: translateX(0);
    opacity: 1;
  }
}

/* ===== BACK BUTTON ===== */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: none;
  color: var(--text-secondary);
  font-size: 0.9rem;
  padding: 8px 0;
  margin-bottom: 16px;
  transition: color var(--transition);
}

.back-btn:hover {
  color: var(--primary);
}

/* ===== PRODUCT DETAIL ===== */
.product-detail {
  display: grid;
  gap: 20px;
}

.product-detail .detail-img {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 280px;
  box-shadow: var(--shadow);
}

.product-detail .detail-img img {
  max-height: 320px;
  object-fit: contain;
}

.product-detail .detail-info {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
}

.product-detail .detail-category {
  font-size: 0.75rem;
  color: var(--primary);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.product-detail .detail-name {
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 12px;
  line-height: 1.3;
}

.product-detail .detail-price-row {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-bottom: 8px;
}

.product-detail .detail-current-price {
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--primary);
}

.product-detail .detail-original-price {
  font-size: 1rem;
  color: var(--text-light);
  text-decoration: line-through;
}

.product-detail .detail-discount {
  font-size: 0.85rem;
  color: var(--success);
  font-weight: 600;
}

.product-detail .detail-description {
  color: var(--text-secondary);
  font-size: 0.9rem;
  line-height: 1.7;
  margin: 16px 0;
}

.product-detail .qty-selector {
  display: flex;
  align-items: center;
  gap: 0;
  margin-bottom: 20px;
  border-radius: var(--radius-sm);
  overflow: hidden;
  border: 1.5px solid var(--border);
  width: fit-content;
}

.product-detail .qty-selector button {
  width: 40px;
  height: 40px;
  background: var(--bg);
  color: var(--text);
  font-size: 1.2rem;
  font-weight: 600;
  transition: background var(--transition);
  border: none;
}

.product-detail .qty-selector button:hover {
  background: var(--primary-light);
  color: var(--primary);
}

.product-detail .qty-selector span {
  width: 48px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  font-size: 1rem;
  border-left: 1.5px solid var(--border);
  border-right: 1.5px solid var(--border);
  background: var(--card);
}

.product-detail .detail-actions {
  display: flex;
  gap: 10px;
}

.product-detail .detail-actions button {
  flex: 1;
  padding: 12px;
  border-radius: var(--radius-sm);
  font-weight: 600;
  font-size: 0.9rem;
  transition: all var(--transition);
}

.product-detail .btn-add-cart {
  background: var(--primary);
  color: #fff;
}

.product-detail .btn-add-cart:hover {
  background: var(--primary-hover);
}

.product-detail .btn-buy-now {
  background: var(--primary-hover);
  color: #fff;
}

.product-detail .btn-buy-now:hover {
  background: #cc4f00;
}

/* ===== CART ===== */
.cart-page h1 {
  font-size: 1.3rem;
  margin-bottom: 20px;
}

.cart-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}

.cart-empty .empty-icon {
  font-size: 3rem;
  margin-bottom: 12px;
}

.cart-empty p {
  font-size: 1rem;
  margin-bottom: 16px;
}

.cart-empty .continue-shopping {
  display: inline-block;
  padding: 10px 28px;
  background: var(--primary);
  color: #fff;
  border-radius: 50px;
  font-weight: 600;
  font-size: 0.9rem;
}

.cart-items {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.cart-item {
  background: var(--card);
  border-radius: var(--radius);
  padding: 16px;
  display: flex;
  gap: 14px;
  box-shadow: var(--shadow);
  align-items: center;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.cart-item .item-img {
  width: 80px;
  height: 80px;
  flex-shrink: 0;
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: #fafafa;
}

[data-theme='dark'] .cart-item .item-img {
  background: #2a2a2a;
}

.cart-item .item-img img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  padding: 6px;
}

.cart-item .item-info {
  flex: 1;
  min-width: 0;
}

.cart-item .item-name {
  font-size: 0.9rem;
  font-weight: 600;
  margin-bottom: 4px;
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.cart-item .item-price {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 8px;
}

.cart-item .item-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}

.cart-item .qty-btn {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--bg);
  color: var(--text);
  font-size: 1rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background var(--transition);
  border: 1px solid var(--border);
}

.cart-item .qty-btn:hover {
  background: var(--primary-light);
  color: var(--primary);
}

.cart-item .item-qty {
  font-size: 0.95rem;
  font-weight: 600;
  width: 28px;
  text-align: center;
}

.cart-item .item-remove {
  background: none;
  color: var(--text-light);
  font-size: 0.8rem;
  padding: 6px;
  transition: color var(--transition);
}

.cart-item .item-remove:hover {
  color: var(--error);
}

.cart-summary {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
  margin-top: 16px;
}

.cart-summary .summary-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  font-size: 0.9rem;
}

.cart-summary .summary-row.total {
  border-top: 1.5px solid var(--border);
  margin-top: 8px;
  padding-top: 12px;
  font-size: 1.1rem;
  font-weight: 700;
}

.cart-summary .summary-row.total .amount {
  color: var(--primary);
  font-size: 1.3rem;
}

.checkout-btn {
  width: 100%;
  padding: 14px;
  background: var(--primary);
  color: #fff;
  border-radius: var(--radius-sm);
  font-weight: 700;
  font-size: 1rem;
  margin-top: 16px;
  transition: background var(--transition);
}

.checkout-btn:hover {
  background: var(--primary-hover);
}

/* ===== CHECKOUT ===== */
.checkout-page h1 {
  font-size: 1.3rem;
  margin-bottom: 20px;
}

.checkout-form {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  box-shadow: var(--shadow);
}

.checkout-form .form-group {
  margin-bottom: 16px;
}

.checkout-form label {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text-secondary);
}

.checkout-form input,
.checkout-form textarea {
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  color: var(--text);
  font-size: 0.95rem;
  transition: border var(--transition);
  outline: none;
}

.checkout-form input:focus,
.checkout-form textarea:focus {
  border-color: var(--primary);
}

.checkout-form textarea {
  min-height: 80px;
  resize: vertical;
}

.checkout-form .form-error {
  color: var(--error);
  font-size: 0.78rem;
  margin-top: 4px;
  display: none;
}

.checkout-form input.invalid,
.checkout-form textarea.invalid {
  border-color: var(--error);
}

.checkout-form input.invalid ~ .form-error,
.checkout-form textarea.invalid ~ .form-error {
  display: block;
}

.checkout-summary-box {
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin: 20px 0;
}

.checkout-summary-box h3 {
  font-size: 0.95rem;
  margin-bottom: 12px;
}

.checkout-summary-box .summary-item {
  display: flex;
  justify-content: space-between;
  font-size: 0.85rem;
  padding: 4px 0;
  color: var(--text-secondary);
}

.checkout-summary-box .summary-total {
  display: flex;
  justify-content: space-between;
  font-size: 1rem;
  font-weight: 700;
  padding-top: 8px;
  margin-top: 8px;
  border-top: 1.5px solid var(--border);
}

.place-order-btn {
  width: 100%;
  padding: 14px;
  background: var(--primary);
  color: #fff;
  border-radius: var(--radius-sm);
  font-weight: 700;
  font-size: 1rem;
  transition: background var(--transition);
}

.place-order-btn:hover {
  background: var(--primary-hover);
}

/* ===== ORDER SUCCESS ===== */
.order-success {
  text-align: center;
  padding: 40px 20px;
}

.order-success .success-icon {
  font-size: 4rem;
  margin-bottom: 16px;
  color: var(--success);
}

.order-success h2 {
  font-size: 1.5rem;
  margin-bottom: 8px;
}

.order-success p {
  color: var(--text-secondary);
  margin-bottom: 24px;
}

.order-success .back-home {
  display: inline-block;
  padding: 12px 32px;
  background: var(--primary);
  color: #fff;
  border-radius: 50px;
  font-weight: 600;
}

/* ===== NO RESULTS ===== */
.no-results {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-secondary);
}

.no-results .no-icon {
  font-size: 3rem;
  margin-bottom: 12px;
}

.no-results p {
  font-size: 1rem;
}

/* ===== FOOTER ===== */
.footer {
  background: var(--card);
  border-top: 1px solid var(--border);
  padding: 24px 0;
  margin-top: 40px;
  text-align: center;
  font-size: 0.85rem;
  color: var(--text-secondary);
  transition: background var(--transition);
}

.footer .footer-links {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}

.footer .footer-links a {
  color: var(--text-secondary);
  transition: color var(--transition);
}

.footer .footer-links a:hover {
  color: var(--primary);
}

/* ===== DARK MODE TOGGLE ===== */
.dark-toggle {
  background: none;
  border: none;
  color: var(--text);
  font-size: 1.2rem;
  padding: 8px;
  border-radius: 50%;
  cursor: pointer;
  transition: background var(--transition);
}

.dark-toggle:hover {
  background: var(--bg);
}

/* ===== SCROLL TO TOP ===== */
.scroll-top {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 44px;
  height: 44px;
  background: var(--primary);
  color: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  box-shadow: var(--shadow-hover);
  opacity: 0;
  pointer-events: none;
  transition: all var(--transition);
  z-index: 100;
}

.scroll-top.visible {
  opacity: 1;
  pointer-events: auto;
}

.scroll-top:hover {
  transform: translateY(-2px);
}

/* ===== VIEW CONTAINER ===== */
.view-container {
  animation: fadeIn 0.3s ease;
}

/* ===== RESPONSIVE ===== */
@media (min-width: 576px) {
  .product-grid {
    grid-template-columns: repeat(3, 1fr);
  }

  .product-detail {
    grid-template-columns: 1fr 1fr;
  }
}

@media (min-width: 768px) {
  .container {
    padding: 0 24px;
  }

  .product-grid {
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }

  .hamburger {
    display: none;
  }

  .sidebar {
    display: none;
  }

  .sidebar-overlay {
    display: none;
  }

  .navbar .container {
    gap: 20px;
  }

  .hero h1 {
    font-size: 2rem;
  }

  .hero {
    padding: 48px;
  }

  .category-pills {
    justify-content: center;
  }

  .cart-item .item-img {
    width: 100px;
    height: 100px;
  }

  .checkout-page .checkout-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }
}

@media (min-width: 992px) {
  .product-grid {
    grid-template-columns: repeat(5, 1fr);
  }
}

@media (min-width: 768px) {
  .desktop-categories {
    display: block !important;
  }
}
</style>
</head>
<body>

  <!-- TOAST CONTAINER -->
  <div id="toast-container" class="toast-container"></div>

  <!-- SIDEBAR OVERLAY -->

  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">
    <h3>Categories</h3>

    <a class="category-link" data-cat="fashion">👕 Fashion</a>
    <div class="sidebar-divider"></div>
    <a class="category-link" onclick="App.navigate('cart')">🛒 Cart</a>

  <!-- NAVBAR -->
  <nav class="navbar">

      <form id="search-form" class="search-bar" autocomplete="off">

  <!-- MAIN CONTENT -->
  <main class="main">
    <div id="view-container" class="view-container"></div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <div class="footer-links">
        <a href="#" onclick="App.navigate('home')">Home</a>
        <a href="#" onclick="App.navigate('cart')">Cart</a>
        <a href="#" onclick="App.showAdmin()">Admin</a>
      </div>
      <p>&copy; 2026 LegentShop. All rights reserved.</p>

  <!-- SCROLL TO TOP -->
  <button id="scroll-top" class="scroll-top" onclick="App.scrollToTop()" aria-label="Scroll to top">↑</button>

<script>
const App = {
  state: {
    products: [],
    cart: [],
    currentView: 'home',
    currentCategory: 'all',
    searchQuery: '',
    darkMode: false,
    detailProductId: null,
  },

  defaultProducts: [
    { id: 'p1', name: 'Wireless Bluetooth Headphones', price: 79, originalPrice: 99, image: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400', category: 'electronics', description: 'Premium wireless headphones with noise cancellation, 30-hour battery life, and comfortable over-ear design.', featured: true, discount: 20 },
    { id: 'p2', name: 'Smartphone Pro Max', price: 899, originalPrice: 1099, image: 'https://images.unsplash.com/photo-1598327105666-5b89351aff97?w=400', category: 'electronics', description: '6.7-inch display, 128GB storage, 48MP camera, 5G connectivity.', featured: true, discount: 18 },
    { id: 'p3', name: 'Running Shoes Ultra', price: 89, originalPrice: 129, image: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400', category: 'fashion', description: 'Lightweight running shoes with responsive cushioning and breathable mesh upper.', featured: true, discount: 31 },
    { id: 'p4', name: 'Classic Denim Jacket', price: 59, originalPrice: 79, image: 'https://images.unsplash.com/photo-1576995853123-5a10305d93c0?w=400', category: 'fashion', description: 'Timeless denim jacket with a modern fit. Perfect for layering.', featured: false, discount: 25 },
    { id: 'p5', name: 'Smart Watch Series 5', price: 199, originalPrice: 249, image: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400', category: 'electronics', description: 'Fitness tracking, heart rate monitor, GPS, and 7-day battery life.', featured: true, discount: 20 },
    { id: 'p6', name: 'Leather Messenger Bag', price: 69, originalPrice: 89, image: 'https://images.unsplash.com/photo-1548036328-c9fa89d128fa?w=400', category: 'fashion', description: 'Genuine leather messenger bag with padded laptop compartment.', featured: false, discount: 22 },
    { id: 'p7', name: '4K Ultra HD Monitor', price: 399, originalPrice: 499, image: 'https://images.unsplash.com/photo-1527443224154-c4a3942d3acf?w=400', category: 'electronics', description: '27-inch 4K UHD monitor with HDR10, IPS panel, and USB-C connectivity.', featured: false, discount: 20 },
    { id: 'p8', name: 'Aviator Sunglasses', price: 49, originalPrice: 69, image: 'https://images.unsplash.com/photo-1572635196237-14b3f281503f?w=400', category: 'fashion', description: 'Classic aviator sunglasses with UV400 protection and gold frame.', featured: true, discount: 29 },
    { id: 'p9', name: 'Wireless Gaming Mouse', price: 49, originalPrice: 59, image: 'https://images.unsplash.com/photo-1527864550417-7fd91fc51a46?w=400', category: 'electronics', description: 'Ergonomic gaming mouse with 16000 DPI, RGB lighting, and 70-hour battery.', featured: false, discount: 17 },
    { id: 'p10', name: 'Casual Canvas Backpack', price: 39, originalPrice: 49, image: 'https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=400', category: 'fashion', description: 'Spacious canvas backpack with multiple compartments and padded straps.', featured: false, discount: 20 },
    { id: 'p11', name: 'Portable Bluetooth Speaker', price: 29, originalPrice: 39, image: 'https://images.unsplash.com/photo-1608043152269-423dbba4e7e1?w=400', category: 'electronics', description: 'Waterproof portable speaker with 12-hour battery and deep bass.', featured: false, discount: 26 },
    { id: 'p12', name: 'Premium Cotton T-Shirt', price: 24, originalPrice: 34, image: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400', category: 'fashion', description: 'Soft 100% organic cotton t-shirt. Available in multiple colors.', featured: false, discount: 29 },
  ],

  init() {
    this.loadProducts();
    this.loadCart();
    this.loadDarkMode();
    this.render();
    this.bindEvents();
  },

  /* ===== DATA PERSISTENCE ===== */
  loadProducts() {
    const stored = localStorage.getItem('shopProducts');
    if (stored) {
      try {
        this.state.products = JSON.parse(stored);
      } catch {
        this.state.products = [...this.defaultProducts];
        this.saveProducts();
      }
    } else {
      this.state.products = [...this.defaultProducts];
      this.saveProducts();
    }
  },

  saveProducts() {
    localStorage.setItem('shopProducts', JSON.stringify(this.state.products));
  },

  loadCart() {
    const stored = localStorage.getItem('shopCart');
    if (stored) {
      try {
        this.state.cart = JSON.parse(stored);
      } catch {
        this.state.cart = [];
        this.saveCart();
      }
    } else {
      this.state.cart = [];
      this.saveCart();
    }
  },

  saveCart() {
    localStorage.setItem('shopCart', JSON.stringify(this.state.cart));
    this.updateCartCount();
  },

  loadDarkMode() {
    const stored = localStorage.getItem('shopDarkMode');
    this.state.darkMode = stored === 'true';
    if (this.state.darkMode) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  },

  saveDarkMode() {
    localStorage.setItem('shopDarkMode', this.state.darkMode);
  },

  /* ===== RENDER ===== */
  render() {
    this.renderNavbarCartCount();
    this.renderView();
  },

  renderView() {
    const container = document.getElementById('view-container');
    if (!container) return;

    switch (this.state.currentView) {
      case 'home':
        this.renderHome(container);
        break;
      case 'detail':
        this.renderDetail(container);
        break;
      case 'cart':
        this.renderCart(container);
        break;
      case 'checkout':
        this.renderCheckout(container);
        break;
      case 'success':
        this.renderSuccess(container);
        break;
      case 'admin':
        this.renderAdmin(container);
        break;
      default:
        this.renderHome(container);
    }
  },

  getFilteredProducts() {
    let products = [...this.state.products];
    if (this.state.currentCategory !== 'all') {
      products = products.filter(p => p.category === this.state.currentCategory);
    }
    if (this.state.searchQuery.trim()) {
      const q = this.state.searchQuery.trim().toLowerCase();
      products = products.filter(p =>
        p.name.toLowerCase().includes(q) ||
        p.description.toLowerCase().includes(q) ||
        p.category.toLowerCase().includes(q)
      );
    }
    products.sort((a, b) => (b.featured ? 1 : 0) - (a.featured ? 1 : 0));
    return products;
  },

  renderHome(container) {
    const featured = this.state.products.filter(p => p.featured);
    const filtered = this.getFilteredProducts();

    container.innerHTML = `
      <div class="container">
        <section class="hero">
          <h1>🔥 Mega Sale!</h1>
          <p>Up to 40% off on top brands. Limited time offer.</p>
          <a class="shop-now" onclick="App.navigate('cart')">Shop Now</a>
        </section>

        <div class="category-pills" id="category-pills">
          <button class="category-pill ${this.state.currentCategory === 'all' ? 'active' : ''}" data-cat="all">All</button>
          <button class="category-pill ${this.state.currentCategory === 'electronics' ? 'active' : ''}" data-cat="electronics">📱 Electronics</button>
          <button class="category-pill ${this.state.currentCategory === 'fashion' ? 'active' : ''}" data-cat="fashion">👕 Fashion</button>
        </div>

        ${featured.length > 0 ? `
          <div class="section-title">
            <h2>⭐ Featured Products</h2>
          </div>
          <div class="product-grid" id="featured-grid">
            ${this.renderProductCards(featured)}
          </div>
        ` : ''}

        <div class="section-title" style="margin-top:24px">
          <h2>${this.state.searchQuery ? `Results for "${this.state.searchQuery}"` : 'All Products'}</h2>
          <span class="view-all">${filtered.length} items</span>
        </div>
        <div class="product-grid" id="product-grid">
          ${filtered.length > 0 ? this.renderProductCards(filtered) : `
            <div class="no-results" style="grid-column:1/-1">
              <div class="no-icon">🔍</div>
              <p>No products found</p>
            </div>
          `}
        </div>
      </div>
    `;

    this.bindCategoryPills();
    this.bindAddToCartButtons();
  },

  renderProductCards(products) {
    return products.map(p => {
      const inCart = this.state.cart.find(c => c.productId === p.id);
      const discount = p.originalPrice > p.price ? Math.round((1 - p.price / p.originalPrice) * 100) : 0;
      return `
        <div class="product-card" onclick="App.goToDetail('${p.id}')">
          <div class="img-wrap">
            <img src="${p.image}" alt="${p.name}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22><rect fill=%22%23f0f0f0%22 width=%22400%22 height=%22400%22/><text fill=%22%23999%22 x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2220%22>No Image</text></svg>'">
            ${discount > 0 ? `<span class="discount-badge">-${discount}%</span>` : ''}
            ${p.featured ? `<span class="featured-badge">⭐</span>` : ''}
          </div>
          <div class="info">
            <span class="category-tag">${p.category}</span>
            <div class="name">${p.name}</div>
            <div class="price-row">
              <span class="current-price">$${p.price.toFixed(2)}</span>
              ${p.originalPrice > p.price ? `<span class="original-price">$${p.originalPrice.toFixed(2)}</span>` : ''}
            </div>
            <button class="add-cart-btn" onclick="event.stopPropagation(); App.addToCart('${p.id}')">
              ${inCart ? '✓ Added' : '🛒 Add to Cart'}
            </button>
          </div>
        </div>
      `;
    }).join('');
  },

  renderDetail(container) {
    const product = this.state.products.find(p => p.id === this.state.detailProductId);
    if (!product) {
      this.navigate('home');
      return;
    }

    const discount = product.originalPrice > product.price ? Math.round((1 - product.price / product.originalPrice) * 100) : 0;
    const inCart = this.state.cart.find(c => c.productId === product.id);
    const qtyInCart = inCart ? inCart.quantity : 1;

    container.innerHTML = `
      <div class="container">
        <button class="back-btn" onclick="App.navigate('home')">← Back</button>
        <div class="product-detail">
          <div class="detail-img">
            <img src="${product.image}" alt="${product.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22400%22 height=%22400%22><rect fill=%22%23f0f0f0%22 width=%22400%22 height=%22400%22/><text fill=%22%23999%22 x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2220%22>No Image</text></svg>'">
          </div>
          <div class="detail-info">
            <div class="detail-category">${product.category}</div>
            <h1 class="detail-name">${product.name}</h1>
            <div class="detail-price-row">
              <span class="detail-current-price">$${product.price.toFixed(2)}</span>
              ${product.originalPrice > product.price ? `<span class="detail-original-price">$${product.originalPrice.toFixed(2)}</span>` : ''}
              ${discount > 0 ? `<span class="detail-discount">Save ${discount}%</span>` : ''}
            </div>
            <p class="detail-description">${product.description}</p>

            <div class="qty-selector">
              <button onclick="App.changeDetailQty(-1)">−</button>
              <span id="detail-qty">${qtyInCart}</span>
              <button onclick="App.changeDetailQty(1)">+</button>
            </div>

            <div class="detail-actions">
              <button class="btn-add-cart" onclick="App.addToCart('${product.id}', parseInt(document.getElementById('detail-qty').textContent))">🛒 Add to Cart</button>
              <button class="btn-buy-now" onclick="App.buyNow('${product.id}')">Buy Now</button>
            </div>
          </div>
        </div>
      </div>
    `;

    this._detailQty = qtyInCart;
  },

  renderCart(container) {
    if (this.state.cart.length === 0) {
      container.innerHTML = `
        <div class="container">
          <h1>🛒 Your Cart</h1>
          <div class="cart-empty">
            <div class="empty-icon">🛒</div>
            <p>Your cart is empty</p>
            <a class="continue-shopping" onclick="App.navigate('home')">Continue Shopping</a>
          </div>
        </div>
      `;
      return;
    }

    const productMap = {};
    this.state.products.forEach(p => { productMap[p.id] = p; });

    let subtotal = 0;
    const itemsHtml = this.state.cart.map(item => {
      const product = productMap[item.productId];
      if (!product) return '';
      const total = product.price * item.quantity;
      subtotal += total;
      return `
        <div class="cart-item" data-id="${item.productId}">
          <div class="item-img">
            <img src="${product.image}" alt="${product.name}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22><rect fill=%22%23f0f0f0%22 width=%22200%22 height=%22200%22/><text fill=%22%23999%22 x=%2250%%22 y=%2250%%22 text-anchor=%22middle%22 dy=%22.3em%22 font-size=%2216%22>No Image</text></svg>'">
          </div>
          <div class="item-info">
            <div class="item-name">${product.name}</div>
            <div class="item-price">$${product.price.toFixed(2)}</div>
            <div class="item-controls">
              <button class="qty-btn" onclick="App.updateCartQty('${item.productId}', -1)">−</button>
              <span class="item-qty">${item.quantity}</span>
              <button class="qty-btn" onclick="App.updateCartQty('${item.productId}', 1)">+</button>
              <button class="item-remove" onclick="App.removeFromCart('${item.productId}')">Remove</button>
            </div>
          </div>
        </div>
      `;
    }).join('');

    container.innerHTML = `
      <div class="container">
        <button class="back-btn" onclick="App.navigate('home')">← Continue Shopping</button>
        <h1>🛒 Your Cart (${this.state.cart.length})</h1>
        <div class="cart-items">${itemsHtml}</div>
        <div class="cart-summary">
          <div class="summary-row">
            <span>Subtotal</span>
            <span>$${subtotal.toFixed(2)}</span>
          </div>
          <div class="summary-row">
            <span>Shipping</span>
            <span>Free</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span class="amount">$${subtotal.toFixed(2)}</span>
          </div>
          <button class="checkout-btn" onclick="App.navigate('checkout')">Proceed to Checkout</button>
        </div>
      </div>
    `;
  },

  renderCheckout(container) {
    if (this.state.cart.length === 0) {
      this.navigate('cart');
      return;
    }

    const productMap = {};
    this.state.products.forEach(p => { productMap[p.id] = p; });
    let total = 0;
    const itemsHtml = this.state.cart.map(item => {
      const product = productMap[item.productId];
      if (!product) return '';
      const lineTotal = product.price * item.quantity;
      total += lineTotal;
      return `
        <div class="summary-item">
          <span>${product.name} × ${item.quantity}</span>
          <span>$${lineTotal.toFixed(2)}</span>
        </div>
      `;
    }).join('');

    container.innerHTML = `
      <div class="container">
        <button class="back-btn" onclick="App.navigate('cart')">← Back to Cart</button>
        <h1>📋 Checkout</h1>
        <div class="checkout-layout">
          <div class="checkout-form" id="checkout-form">
            <div class="form-group">
              <label for="ch-name">Full Name</label>
              <input type="text" id="ch-name" placeholder="John Doe" required>
              <div class="form-error">Please enter your name</div>
            </div>
            <div class="form-group">
              <label for="ch-phone">Phone Number</label>
              <input type="tel" id="ch-phone" placeholder="+1 234 567 890" required>
              <div class="form-error">Please enter a valid phone number</div>
            </div>
            <div class="form-group">
              <label for="ch-address">Shipping Address</label>
              <textarea id="ch-address" placeholder="Street, City, State, ZIP" required></textarea>
              <div class="form-error">Please enter your address</div>
            </div>
            <div class="checkout-summary-box">
              <h3>Order Summary</h3>
              ${itemsHtml}
              <div class="summary-total">
                <span>Total</span>
                <span>$${total.toFixed(2)}</span>
              </div>
            </div>
            <button class="place-order-btn" onclick="App.placeOrder()">📦 Place Order</button>
          </div>
        </div>
      </div>
    `;
  },

  renderSuccess(container) {
    container.innerHTML = `
      <div class="container">
        <div class="order-success">
          <div class="success-icon">✅</div>
          <h2>Order Placed Successfully!</h2>
          <p>Thank you for your purchase. Your order will be shipped soon.</p>
          <a class="back-home" onclick="App.navigate('home')">Continue Shopping</a>
        </div>
      </div>
    `;
  },

  renderAdmin(container) {
    const total = this.state.products.length;
    const featured = this.state.products.filter(p => p.featured).length;
    const electronics = this.state.products.filter(p => p.category === 'electronics').length;
    const fashion = this.state.products.filter(p => p.category === 'fashion').length;

    container.innerHTML = `
      <div class="container">
        <button class="back-btn" onclick="App.navigate('home')">← Back to Store</button>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px">
          <h1 style="font-size:1.4rem">⚙️ Admin Dashboard</h1>
          <button style="padding:8px 16px;background:var(--error);color:#fff;border-radius:8px;font-size:0.82rem;font-weight:600" onclick="App.resetDefaults()">Reset Default Products</button>
        </div>

        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:24px">
          <div style="background:var(--card);border-radius:12px;padding:16px;text-align:center;box-shadow:var(--shadow)">
            <div style="font-size:1.6rem;font-weight:800;color:var(--primary)">${total}</div>
            <div style="font-size:0.78rem;color:var(--text-secondary);margin-top:4px">Total Products</div>
          </div>
          <div style="background:var(--card);border-radius:12px;padding:16px;text-align:center;box-shadow:var(--shadow)">
            <div style="font-size:1.6rem;font-weight:800;color:var(--primary)">${featured}</div>
            <div style="font-size:0.78rem;color:var(--text-secondary);margin-top:4px">Featured</div>
          </div>
          <div style="background:var(--card);border-radius:12px;padding:16px;text-align:center;box-shadow:var(--shadow)">
            <div style="font-size:1.6rem;font-weight:800;color:var(--primary)">${electronics}</div>
            <div style="font-size:0.78rem;color:var(--text-secondary);margin-top:4px">Electronics</div>
          </div>
          <div style="background:var(--card);border-radius:12px;padding:16px;text-align:center;box-shadow:var(--shadow)">
            <div style="font-size:1.6rem;font-weight:800;color:var(--primary)">${fashion}</div>
            <div style="font-size:0.78rem;color:var(--text-secondary);margin-top:4px">Fashion</div>
          </div>
        </div>

        <div style="display:grid;gap:24px">
          <div style="background:var(--card);border-radius:12px;padding:24px;box-shadow:var(--shadow)">
            <h2 style="font-size:1.1rem;margin-bottom:16px">➕ Add New Product</h2>
            <form id="admin-form" autocomplete="off">
              <div style="display:grid;gap:12px;margin-bottom:12px">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                  <div style="display:flex;flex-direction:column;gap:4px">
                    <label style="font-size:0.82rem;font-weight:600;color:var(--text-secondary)">Product Name</label>
                    <input type="text" id="a-name" required placeholder="e.g. Wireless Headphones" style="padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:0.9rem;outline:none">
                  </div>
                  <div style="display:flex;flex-direction:column;gap:4px">
                    <label style="font-size:0.82rem;font-weight:600;color:var(--text-secondary)">Category</label>
                    <select id="a-category" style="padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:0.9rem;outline:none">
                      <option value="electronics">Electronics</option>
                      <option value="fashion">Fashion</option>
                    </select>
                  </div>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                  <div style="display:flex;flex-direction:column;gap:4px">
                    <label style="font-size:0.82rem;font-weight:600;color:var(--text-secondary)">Price ($)</label>
                    <input type="number" id="a-price" step="0.01" min="0.01" required placeholder="29.99" style="padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:0.9rem;outline:none">
                  </div>
                  <div style="display:flex;flex-direction:column;gap:4px">
                    <label style="font-size:0.82rem;font-weight:600;color:var(--text-secondary)">Original Price ($)</label>
                    <input type="number" id="a-original" step="0.01" min="0" placeholder="39.99" style="padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:0.9rem;outline:none">
                  </div>
                </div>
                <div style="display:flex;flex-direction:column;gap:4px">
                  <label style="font-size:0.82rem;font-weight:600;color:var(--text-secondary)">Image URL</label>
                  <input type="url" id="a-image" required placeholder="https://example.com/image.jpg" style="padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:0.9rem;outline:none">
                </div>
                <div style="display:flex;flex-direction:column;gap:4px">
                  <label style="font-size:0.82rem;font-weight:600;color:var(--text-secondary)">Description</label>
                  <textarea id="a-desc" required placeholder="Product description..." style="padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:0.9rem;outline:none;min-height:60px;resize:vertical"></textarea>
                </div>
                <div style="display:flex;align-items:center;gap:8px">
                  <input type="checkbox" id="a-featured" style="width:18px;height:18px;accent-color:var(--primary)">
                  <label for="a-featured" style="font-size:0.9rem">⭐ Mark as Featured</label>
                </div>
              </div>
              <button type="submit" style="padding:12px 24px;background:var(--primary);color:#fff;border-radius:8px;font-weight:600;font-size:0.95rem;width:100%">➕ Add Product</button>
            </form>
          </div>

          <div style="background:var(--card);border-radius:12px;padding:24px;box-shadow:var(--shadow)">
            <h2 style="font-size:1.1rem;margin-bottom:16px">📦 All Products (${total})</h2>
            <div id="admin-list">
              ${total === 0 ? '<div style="text-align:center;padding:40px;color:var(--text-secondary)">No products yet.</div>' : `
              <div style="overflow-x:auto">
                <table style="width:100%;border-collapse:collapse;font-size:0.85rem">
                  <thead>
                    <tr>
                      <th style="text-align:left;padding:10px 12px;background:var(--bg);color:var(--text-secondary);font-weight:600;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1.5px solid var(--border)">Image</th>
                      <th style="text-align:left;padding:10px 12px;background:var(--bg);color:var(--text-secondary);font-weight:600;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1.5px solid var(--border)">Name</th>
                      <th style="text-align:left;padding:10px 12px;background:var(--bg);color:var(--text-secondary);font-weight:600;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1.5px solid var(--border)">Cat</th>
                      <th style="text-align:left;padding:10px 12px;background:var(--bg);color:var(--text-secondary);font-weight:600;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1.5px solid var(--border)">Price</th>
                      <th style="text-align:left;padding:10px 12px;background:var(--bg);color:var(--text-secondary);font-weight:600;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1.5px solid var(--border)">Feat</th>
                      <th style="text-align:left;padding:10px 12px;background:var(--bg);color:var(--text-secondary);font-weight:600;font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1.5px solid var(--border)">Action</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${this.state.products.map(p => {
                      const disc = p.originalPrice > p.price ? Math.round((1 - p.price / p.originalPrice) * 100) : 0;
                      return `<tr>
                        <td style="padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle"><img src="${p.image}" alt="" style="width:48px;height:48px;border-radius:6px;object-fit:contain;background:#fafafa" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2248%22 height=%2248%22><rect fill=%22%23f0f0f0%22 width=%2248%22 height=%2248%22/></svg>'"></td>
                        <td style="padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;font-weight:600">${p.name}</td>
                        <td style="padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle"><span style="font-size:0.75rem;color:var(--primary);font-weight:600;text-transform:uppercase">${p.category}</span></td>
                        <td style="padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle">$${p.price.toFixed(2)}${disc > 0 ? `<span style="font-size:0.7rem;color:var(--success)">(-${disc}%)</span>` : ''}</td>
                        <td style="padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle">${p.featured ? '⭐' : '−'}</td>
                        <td style="padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle">
                          <button style="padding:6px 14px;background:var(--warning);color:#fff;border-radius:8px;font-size:0.78rem;font-weight:600;margin-right:4px" onclick="App.toggleFeatured('${p.id}')">${p.featured ? 'Unfeature' : 'Feature'}</button>
                          <button style="padding:6px 14px;background:var(--error);color:#fff;border-radius:8px;font-size:0.78rem;font-weight:600" onclick="App.deleteProduct('${p.id}')">Delete</button>
                        </td>
                      </tr>`;
                    }).join('')}
                  </tbody>
                </table>
              </div>
              `}
            </div>
          </div>
        </div>
      </div>
    `;

    const form = document.getElementById('admin-form');
    if (form) {
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('a-name').value.trim();
        const category = document.getElementById('a-category').value;
        const price = parseFloat(document.getElementById('a-price').value);
        const origInput = document.getElementById('a-original').value;
        const originalPrice = origInput ? parseFloat(origInput) : price;
        const image = document.getElementById('a-image').value.trim();
        const description = document.getElementById('a-desc').value.trim();
        const featured = document.getElementById('a-featured').checked;

        if (!name || !price || !image || !description) {
          this.showToast('Please fill all required fields', 'error');
          return;
        }

        this.state.products.push({
          id: 'p' + Date.now(),
          name, category, price,
          originalPrice: originalPrice > price ? originalPrice : price,
          image, description, featured,
        });
        this.saveProducts();
        this.showToast(`"${name}" added!`, 'success');
        this.renderAdmin(container);
      });
    }
  },

  /* ===== ADMIN ACTIONS ===== */
  showAdmin() {
    const pw = prompt('Enter admin password:');
    if (pw !== '12341234') {
      if (pw !== null) this.showToast('Incorrect password', 'error');
      return;
    }
    this.navigate('admin');
  },

  deleteProduct(id) {
    if (!confirm('Delete this product?')) return;
    const p = this.state.products.find(x => x.id === id);
    this.state.products = this.state.products.filter(x => x.id !== id);
    this.saveProducts();
    if (p) this.showToast(`"${p.name}" deleted`, 'success');
    this.renderView();
  },

  toggleFeatured(id) {
    const p = this.state.products.find(x => x.id === id);
    if (p) {
      p.featured = !p.featured;
      this.saveProducts();
      this.showToast(p.featured ? 'Marked featured' : 'Unmarked', 'success');
      this.renderView();
    }
  },

  resetDefaults() {
    if (!confirm('Reset all products to defaults?')) return;
    this.state.products = JSON.parse(JSON.stringify(this.defaultProducts));
    this.saveProducts();
    this.showToast('Reset to defaults', 'success');
    this.navigate('home');
  },

  /* ===== NAVIGATION ===== */
  navigate(view) {
    this.state.currentView = view;
    this.renderView();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  },

  goToDetail(productId) {
    this.state.detailProductId = productId;
    this.navigate('detail');
  },

  buyNow(productId) {
    const qty = parseInt(document.getElementById('detail-qty')?.textContent || '1');
    this.addToCart(productId, qty);
    this.navigate('checkout');
  },

  /* ===== CART OPERATIONS ===== */
  addToCart(productId, qty) {
    const product = this.state.products.find(p => p.id === productId);
    if (!product) {
      this.showToast('Product not found', 'error');
      return;
    }

    const quantity = qty || 1;
    const existing = this.state.cart.find(c => c.productId === productId);

    if (existing) {
      existing.quantity += quantity;
    } else {
      this.state.cart.push({ productId, quantity });
    }

    this.saveCart();
    this.showToast(`${product.name} added to cart!`, 'success');
    this.renderView();
  },

  removeFromCart(productId) {
    this.state.cart = this.state.cart.filter(c => c.productId !== productId);
    this.saveCart();
    this.showToast('Item removed from cart', 'success');
    this.renderView();
  },

  updateCartQty(productId, delta) {
    const item = this.state.cart.find(c => c.productId === productId);
    if (!item) return;
    item.quantity += delta;
    if (item.quantity <= 0) {
      this.removeFromCart(productId);
      return;
    }
    this.saveCart();
    this.renderView();
  },

  changeDetailQty(delta) {
    const el = document.getElementById('detail-qty');
    if (!el) return;
    let qty = parseInt(el.textContent) + delta;
    if (qty < 1) qty = 1;
    el.textContent = qty;
    this._detailQty = qty;
  },

  updateCartCount() {
    const count = this.state.cart.reduce((sum, item) => sum + item.quantity, 0);
    document.querySelectorAll('.cart-count').forEach(el => {
      el.textContent = count;
    });
  },

  renderNavbarCartCount() {
    this.updateCartCount();
  },

  getCartTotal() {
    const productMap = {};
    this.state.products.forEach(p => { productMap[p.id] = p; });
    return this.state.cart.reduce((sum, item) => {
      const p = productMap[item.productId];
      return sum + (p ? p.price * item.quantity : 0);
    }, 0);
  },

  /* ===== CHECKOUT ===== */
  placeOrder() {
    const name = document.getElementById('ch-name');
    const phone = document.getElementById('ch-phone');
    const address = document.getElementById('ch-address');
    let valid = true;

    [name, phone, address].forEach(el => el.classList.remove('invalid'));

    if (!name.value.trim()) { name.classList.add('invalid'); valid = false; }
    if (!phone.value.trim()) { phone.classList.add('invalid'); valid = false; }
    if (!address.value.trim()) { address.classList.add('invalid'); valid = false; }

    if (!valid) {
      this.showToast('Please fill in all fields', 'error');
      return;
    }

    this.state.cart = [];
    this.saveCart();
    this.showToast('Order placed successfully! 🎉', 'success');
    this.navigate('success');
  },

  /* ===== SEARCH ===== */
  handleSearch(e) {
    e.preventDefault();
    const input = document.getElementById('search-input');
    this.state.searchQuery = input.value.trim();
    this.state.currentCategory = 'all';
    this.navigate('home');
  },

  clearSearch() {
    this.state.searchQuery = '';
    const input = document.getElementById('search-input');
    if (input) input.value = '';
  },

  /* ===== CATEGORY ===== */
  setCategory(cat) {
    this.state.currentCategory = cat;
    this.state.searchQuery = '';
    const input = document.getElementById('search-input');
    if (input) input.value = '';
    this.navigate('home');
    this.closeSidebar();
  },

  bindCategoryPills() {
    document.querySelectorAll('.category-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        this.state.currentCategory = btn.dataset.cat;
        this.state.searchQuery = '';
        const input = document.getElementById('search-input');
        if (input) input.value = '';
        this.navigate('home');
      });
    });
  },

  bindAddToCartButtons() {},

  /* ===== DARK MODE ===== */
  toggleDarkMode() {
    this.state.darkMode = !this.state.darkMode;
    if (this.state.darkMode) {
      document.documentElement.setAttribute('data-theme', 'dark');
    } else {
      document.documentElement.removeAttribute('data-theme');
    }
    this.saveDarkMode();
    const icon = document.getElementById('dark-icon');
    if (icon) icon.textContent = this.state.darkMode ? '☀️' : '🌙';
  },

  /* ===== SIDEBAR ===== */
  toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const hamburger = document.getElementById('hamburger');
    sidebar.classList.toggle('open');
    overlay.classList.toggle('active');
    hamburger.classList.toggle('active');
    document.body.style.overflow = sidebar.classList.contains('open') ? 'hidden' : '';
  },

  closeSidebar() {
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('sidebar-overlay');
    const hamburger = document.getElementById('hamburger');
    sidebar.classList.remove('open');
    overlay.classList.remove('active');
    hamburger.classList.remove('active');
    document.body.style.overflow = '';
  },

  /* ===== TOAST ===== */
  showToast(message, type = 'success') {
    const container = document.getElementById('toast-container');
    if (!container) return;

    const toast = document.createElement('div');
    toast.className = `toast ${type}`;
    const icon = type === 'success' ? '✅' : type === 'error' ? '❌' : 'ℹ️';
    toast.innerHTML = `<span class="toast-icon">${icon}</span> ${message}`;
    container.appendChild(toast);

    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(100%)';
      toast.style.transition = 'all 0.3s ease';
      setTimeout(() => toast.remove(), 300);
    }, 3000);
  },

  /* ===== SCROLL TO TOP ===== */
  handleScroll() {
    const btn = document.getElementById('scroll-top');
    if (btn) {
      btn.classList.toggle('visible', window.scrollY > 300);
    }
  },

  scrollToTop() {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  },

  /* ===== EVENT BINDING ===== */
  bindEvents() {
    const searchForm = document.getElementById('search-form');
    if (searchForm) searchForm.addEventListener('submit', (e) => this.handleSearch(e));

    const hamburger = document.getElementById('hamburger');
    if (hamburger) hamburger.addEventListener('click', () => this.toggleSidebar());

    const overlay = document.getElementById('sidebar-overlay');
    if (overlay) overlay.addEventListener('click', () => this.closeSidebar());

    window.addEventListener('scroll', () => this.handleScroll());

    document.querySelectorAll('.category-link').forEach(link => {
      link.addEventListener('click', () => {
        this.setCategory(link.dataset.cat);
      });
    });

    const darkToggle = document.getElementById('dark-toggle');
    if (darkToggle) darkToggle.addEventListener('click', () => this.toggleDarkMode());

    const cartBtn = document.getElementById('cart-btn');
    if (cartBtn) cartBtn.addEventListener('click', () => this.navigate('cart'));

    const logo = document.getElementById('logo-link');
    if (logo) logo.addEventListener('click', (e) => {
      e.preventDefault();
      this.clearSearch();
      this.state.currentCategory = 'all';
      this.navigate('home');
    });
  },
};

document.addEventListener('DOMContentLoaded', () => App.init());
</script>
</body>
</html>
